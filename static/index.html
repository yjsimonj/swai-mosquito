<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모기 신고 시스템 — 대전과학고</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: #0f1923;
    color: #e8edf2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #162030;
    border-bottom: 2px solid #1e3a5f;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  header h1 { font-size: 1.2rem; font-weight: 700; color: #4fc3f7; }
  header p { font-size: 0.8rem; color: #7a9bbf; }
  #ws-status {
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 600;
  }
  .status-connected { background: #1a3a1a; color: #66bb6a; }
  .status-disconnected { background: #3a1a1a; color: #ef5350; }

  .controls {
    padding: 14px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .tab-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab-label { font-size: 0.7rem; color: #5a7a9a; margin-bottom: 2px; }
  .tab-btn {
    padding: 7px 16px;
    border: 1.5px solid #2a4a6a;
    background: #162030;
    color: #8aabcb;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.15s;
  }
  .tab-btn:hover { background: #1e3a5f; color: #cde; }
  .tab-btn.active { background: #1565c0; border-color: #42a5f5; color: #fff; }

  #map-wrapper {
    flex: 1;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
  }
  #map-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    border: 1.5px solid #1e3a5f;
    border-radius: 10px;
    background: #0d1822;
  }
  #floor-map {
    display: block;
    min-width: 600px;
    width: 100%;
    height: auto;
  }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    padding: 0 2px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: #8aabcb;
  }
  .legend-dot {
    width: 14px; height: 14px; border-radius: 3px;
  }
  .dot-normal { background: #0e2240; border: 1.5px solid #2a5a9a; }
  .dot-active { background: #7f1111; border: 1.5px solid #ef5350; }
  .dot-utility { background: #0f1e2e; border: 1.5px solid #1e3a5a; }
  .dot-corridor { background: #0d1925; border: 1.5px solid #1a3050; }
  .dot-exit { background: #0a7d34; border: 1.5px solid #2ecc71; }

  #stats-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 0.8rem;
    color: #7a9bbf;
  }
  #stats-bar strong { color: #ef5350; }

  /* Modal */
  #modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: #162030;
    border: 1.5px solid #2a4a6a;
    border-radius: 12px;
    padding: 24px;
    min-width: 280px;
    max-width: 380px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #modal h2 { font-size: 1.1rem; margin-bottom: 8px; color: #4fc3f7; }
  #modal .zone-label {
    font-size: 1.4rem; font-weight: 700; margin: 10px 0;
    color: #e8edf2;
  }
  #modal .meta { font-size: 0.78rem; color: #5a7a9a; margin-bottom: 18px; }
  #modal .desc { font-size: 0.85rem; color: #9ab5cf; margin-bottom: 20px; line-height: 1.5; white-space: pre-line; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }
  .btn {
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-danger { background: #c62828; color: #fff; }
  .btn-primary { background: #1565c0; color: #fff; }
  .btn-ghost { background: #1e3a5f; color: #8aabcb; }

let ws              = null;

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById("ws-status").textContent = "● 연결됨";
    document.getElementById("ws-status").className = "status-connected";
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === "update") {
      activeReports = {};
      data.reports.forEach(r => { activeReports[r.zone_id] = r; });
      renderMap();
      updateStats();
    }
  };
  ws.onclose = () => {
    document.getElementById("ws-status").textContent = "● 연결 끊김";
    document.getElementById("ws-status").className = "status-disconnected";
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => ws.close();
}

// ─── Rendering ────────────────────────────────────────────────────────────────
const SVG_NS = "http://www.w3.org/2000/svg";

function renderMap() {
  const floorData = FLOOR_DATA[currentBuilding][currentFloor];
  const svg = document.getElementById("floor-map");
  svg.setAttribute("viewBox", floorData.viewBox);
  svg.innerHTML = "";

  floorData.zones.forEach(zone => {
    if (!zone.id) return;
    const g = document.createElementNS(SVG_NS, "g");
    const isActive   = !!activeReports[zone.id];
    const isExit     = zone.type === "exit";
    const isUtility  = zone.type === "utility";
    const isCorridor = zone.type === "corridor";
    const reportable = zone.reportable !== false && !isExit;

    // Rect
    const rect = document.createElementNS(SVG_NS, "rect");
    rect.setAttribute("x", zone.x + 1);
    rect.setAttribute("y", zone.y + 1);
    rect.setAttribute("width",  zone.w - 2);
    rect.setAttribute("height", zone.h - 2);
    rect.setAttribute("rx", "4");

    if (isActive) {
      rect.setAttribute("fill", "#7f1111");
      rect.setAttribute("stroke", "#ef5350");
      rect.setAttribute("stroke-width", "2");
    } else if (isExit) {
      rect.setAttribute("fill", "#0a7d34");
      rect.setAttribute("stroke", "#2ecc71");
      rect.setAttribute("stroke-width", "1.5");
    } else if (isUtility) {
      rect.setAttribute("fill", "#0f1e2e");
      rect.setAttribute("stroke", "#1e3a5a");
      rect.setAttribute("stroke-width", "1");
    } else if (isCorridor) {
      rect.setAttribute("fill", "#0d1925");
      rect.setAttribute("stroke", "#1a3050");
      rect.setAttribute("stroke-width", "1");
    } else {
      rect.setAttribute("fill", "#0e2240");
      rect.setAttribute("stroke", "#2a5a9a");
      rect.setAttribute("stroke-width", "1.5");
    }
    g.appendChild(rect);

    // Exit door icon
    if (isExit) {
      const ic = document.createElementNS(SVG_NS, "text");
      ic.setAttribute("x", zone.x + zone.w / 2);
      ic.setAttribute("y", zone.y + zone.h / 2);
      ic.setAttribute("text-anchor", "middle");
      ic.setAttribute("dominant-baseline", "central");
      ic.setAttribute("font-size", Math.min(15, zone.w - 6));
      ic.setAttribute("pointer-events", "none");
      ic.textContent = "🚪";
      g.appendChild(ic);
      svg.appendChild(g);
      return;
    }

    // Pulse animation for active zones
    if (isActive) {
      const cx = zone.x + zone.w / 2;
      const cy = zone.y + zone.h / 2;
      const pulse = document.createElementNS(SVG_NS, "circle");
      pulse.setAttribute("cx", cx);
      pulse.setAttribute("cy", cy);
      pulse.setAttribute("r", "8");
      pulse.setAttribute("fill", "none");
      pulse.setAttribute("stroke", "#ff5252");
      pulse.setAttribute("stroke-width", "2");
      pulse.setAttribute("opacity", "0.8");
      const a1 = document.createElementNS(SVG_NS, "animate");
      a1.setAttribute("attributeName", "r");
      a1.setAttribute("values", "6;18;6");
      a1.setAttribute("dur", "1.6s");
      a1.setAttribute("repeatCount", "indefinite");
      const a2 = document.createElementNS(SVG_NS, "animate");
      a2.setAttribute("attributeName", "opacity");
      a2.setAttribute("values", "0.8;0;0.8");
      a2.setAttribute("dur", "1.6s");
      a2.setAttribute("repeatCount", "indefinite");
      pulse.appendChild(a1);
      pulse.appendChild(a2);
      g.appendChild(pulse);
    }

    // Text label
    if (zone.name && zone.w > 30 && zone.h > 24) {
      const lines = zone.name.split("\n");
      const cx = zone.x + zone.w / 2;
      const cy = zone.y + zone.h / 2;
      const fontSize = zone.w < 55 ? 9 : zone.w < 90 ? 10 : 11;
      const lineH = fontSize + 3;
      const startY = cy - ((lines.length - 1) * lineH) / 2;

      lines.forEach((line, i) => {
        const t = document.createElementNS(SVG_NS, "text");
        t.setAttribute("x", cx);
        t.setAttribute("y", startY + i * lineH);
        t.setAttribute("text-anchor", "middle");
        t.setAttribute("dominant-baseline", "middle");
        t.setAttribute("font-size", fontSize);
        t.setAttribute("fill", isActive ? "#ffcdd2" : (isUtility ? "#3a5a7a" : "#9fc8f0"));
        t.setAttribute("font-weight", isActive ? "700" : "400");
        t.setAttribute("pointer-events", "none");
        t.textContent = line;
        g.appendChild(t);
      });

      if (isActive) {
        const emoji = document.createElementNS(SVG_NS, "text");
        emoji.setAttribute("x", zone.x + zone.w - 12);
        emoji.setAttribute("y", zone.y + 16);
        emoji.setAttribute("font-size", 14);
        emoji.setAttribute("pointer-events", "none");
        emoji.textContent = "🦟";
        g.appendChild(emoji);
      }
    }

    // Interaction
    if (reportable) {
      g.style.cursor = "pointer";
      g.addEventListener("mouseenter", () => {
        rect.setAttribute("fill", isActive ? "#9b1111" : (isUtility ? "#152535" : (isCorridor ? "#13202e" : "#152e55")));
      });
      g.addEventListener("mouseleave", () => {
        if (isActive)        rect.setAttribute("fill", "#7f1111");
        else if (isUtility)  rect.setAttribute("fill", "#0f1e2e");
        else if (isCorridor) rect.setAttribute("fill", "#0d1925");
        else                 rect.setAttribute("fill", "#0e2240");
      });
      g.addEventListener("click", () => openModal(zone));
    }

    svg.appendChild(g);
  });
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function updateStats() {
  const total = Object.keys(activeReports).length;
  document.getElementById("total-count").textContent = total;

  const bCount = {};
  Object.values(activeReports).forEach(r => {
    bCount[r.building] = (bCount[r.building] || 0) + 1;
  });
  const parts = Object.entries(bCount).map(([b, c]) => `${b}: ${c}건`);
  document.getElementById("building-count").textContent = parts.join(" · ");
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(zone) {
  const overlay = document.getElementById("modal-overlay");
  const report  = activeReports[zone.id];

  document.getElementById("modal-zone").textContent =
    zone.name.replace("\n", " ") + ` (${currentBuilding} ${currentFloor})`;

  const btns = document.getElementById("modal-btns");
  btns.innerHTML = "";

  if (report) {
    document.getElementById("modal-title").textContent = "⚠️ 모기 신고 구역";
    document.getElementById("modal-meta").textContent  = `신고 시각: ${formatKST(report.reported_at)}`;
    document.getElementById("modal-desc").textContent  =
      "이 구역에 모기가 신고되어 있습니다.\n상황이 종료되었으면 아래 버튼을 눌러주세요.";

    const resolveBtn = document.createElement("button");
    resolveBtn.className = "btn btn-danger";
    resolveBtn.textContent = "상황 종료";
    resolveBtn.onclick = () => {
      closeModal();  // 즉시 닫기 (지도는 WebSocket으로 갱신)
      fetch(`/api/resolve/${encodeURIComponent(zone.id)}`, { method: "POST" }).catch(() => {});
    };
    const cancelBtn = document.createElement("button");
    cancelBtn.className = "btn btn-ghost";
    cancelBtn.textContent = "닫기";
    cancelBtn.onclick = closeModal;
    btns.appendChild(resolveBtn);
    btns.appendChild(cancelBtn);
  } else {
    document.getElementById("modal-title").textContent = "🦟 모기 신고";
    document.getElementById("modal-meta").textContent  = "";
    document.getElementById("modal-desc").textContent  =
      "이 구역에 모기가 있습니까?\n신고하면 지도에 표시되며 30분 후 자동 해제됩니다.";

    const reportBtn = document.createElement("button");
    reportBtn.className = "btn btn-primary";
    reportBtn.textContent = "신고하기";
    reportBtn.onclick = () => {
      closeModal();  // 즉시 닫기 (지도는 WebSocket으로 갱신)
      fetch("/api/report", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          zone_id:   zone.id,
          building:  currentBuilding,
          floor:     currentFloor,
          zone_name: zone.name.replace("\n", " ")
        })
      }).catch(() => {});
    };
    const cancelBtn = document.createElement("button");
    cancelBtn.className = "btn btn-ghost";
    cancelBtn.textContent = "취소";
    cancelBtn.onclick = closeModal;
    btns.appendChild(reportBtn);
    btns.appendChild(cancelBtn);
  }

  overlay.classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}

document.getElementById("modal-overlay").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function buildTabs() {
  const bTab = document.getElementById("building-tabs");
  Object.keys(FLOOR_DATA).forEach(b => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (b === currentBuilding ? " active" : "");
    btn.textContent = b;
    btn.onclick = () => selectBuilding(b);
    bTab.appendChild(btn);
  });
  renderFloorTabs();
}

function renderFloorTabs() {
  const fTab = document.getElementById("floor-tabs");
  fTab.innerHTML = "";
  FLOOR_DATA[currentBuilding].floors.forEach(f => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (f === currentFloor ? " active" : "");
    btn.textContent = f;
    btn.onclick = () => selectFloor(f);
    fTab.appendChild(btn);
  });
}

function selectBuilding(b) {
  currentBuilding = b;
  currentFloor = FLOOR_DATA[b].floors[0];
  document.querySelectorAll("#building-tabs .tab-btn").forEach(el => {
    el.classList.toggle("active", el.textContent === b);
  });
  renderFloorTabs();
  renderMap();
}

function selectFloor(f) {
  currentFloor = f;
  document.querySelectorAll("#floor-tabs .tab-btn").forEach(el => {
    el.classList.toggle("active", el.textContent === f);
  });
  renderMap();
}

// ─── Utility ─────────────────────────────────────────────────────────────────
function formatKST(utcIso) {
  try {
    const d = new Date(utcIso + "Z");
    return d.toLocaleString("ko-KR", {
      timeZone: "Asia/Seoul",
      month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit"
    });
  } catch (_) { return utcIso; }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
buildTabs();
renderMap();
connectWS();
</script>
